<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joushen spacing</title>
    <link rel="stylesheet" href="../tokens.css" />
    <style>
      body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font-body); }
      main { max-width: var(--container-max); margin: 0 auto; padding: var(--space-12) var(--space-6); }
      h1 { margin: 0 0 var(--space-8); font-family: var(--font-display); font-size: var(--text-2xl); line-height: var(--leading-tight); letter-spacing: var(--tracking-display); }
      .row { display: flex; align-items: center; gap: var(--space-4); padding-block: var(--space-2); }
      .token { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); min-width: 9ch; }
      .bar { height: 16px; background: var(--accent); border-radius: var(--radius-sm); }
      .radii { display: flex; gap: var(--space-6); margin-block-start: var(--space-8); }
      .chip { width: 88px; height: 88px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--elev-raised); display: flex; align-items: flex-end; padding: var(--space-2); font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted); }
    </style>
  </head>
  <body>
    <main>
      <h1>Spacing &amp; radius — 4px grid</h1>

      <div class="row"><span class="token">--space-1</span><div class="bar" style="width: var(--space-1)"></div></div>
      <div class="row"><span class="token">--space-2</span><div class="bar" style="width: var(--space-2)"></div></div>
      <div class="row"><span class="token">--space-3</span><div class="bar" style="width: var(--space-3)"></div></div>
      <div class="row"><span class="token">--space-4</span><div class="bar" style="width: var(--space-4)"></div></div>
      <div class="row"><span class="token">--space-5</span><div class="bar" style="width: var(--space-5)"></div></div>
      <div class="row"><span class="token">--space-6</span><div class="bar" style="width: var(--space-6)"></div></div>
      <div class="row"><span class="token">--space-8</span><div class="bar" style="width: var(--space-8)"></div></div>
      <div class="row"><span class="token">--space-12</span><div class="bar" style="width: var(--space-12)"></div></div>

      <div class="radii">
        <div class="chip" style="border-radius: var(--radius-sm)">sm 6px</div>
        <div class="chip" style="border-radius: var(--radius-md)">md 10px</div>
        <div class="chip" style="border-radius: var(--radius-lg)">lg 16px</div>
        <div class="chip" style="border-radius: var(--radius-pill)">pill</div>
      </div>
    </main>
  </body>
</html>
